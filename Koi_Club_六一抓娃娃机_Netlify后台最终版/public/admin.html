
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Koi Club 六一抓娃娃机｜后台端</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">
  <header class="header">
    <div class="badge">KOI CLUB ADMIN</div>
    <h1>活动后台</h1>
    <div class="subtitle">兑换码 · 抓取记录</div>
  </header>
  <section class="admin-card">
    <h3 class="section-title">✅ 后台已开启</h3>
    <div class="rec">当前后台无需密码，可直接生成兑换码、查看记录和管理库存。</div>
  </section>

  <section id="adminContent">
    <section class="admin-card">
      <h3 class="section-title">🎫 创建抓娃娃资格</h3>
      <div class="admin-grid">
        <div class="row">
          <input class="input" id="pay" placeholder="付款金额" value="6.1" />
          <input class="input" id="times" placeholder="抓取次数" value="1" type="number" min="1" />
        </div>
        <div class="row">
          <input class="input" id="count" placeholder="生成数量" value="1" type="number" min="1" />
          <button class="btn btn-main" id="createBtn">生成兑换码</button>
        </div>
      </div>
      <div class="records" id="codesBox" style="margin-top:8px"></div>
    </section>

    <section class="admin-card">
      <h3 class="section-title">📋 顾客抓取记录</h3>
      <div class="records" id="recordsBox"></div>
      <div class="row" style="margin-top:8px">
        <button class="btn btn-blue" id="refreshBtn">刷新记录</button>
        <button class="btn btn-soft" id="exportBtn">导出 CSV</button>
      </div>
    </section>

    <section class="admin-card">
      <h3 class="section-title">🎁 奖励库存</h3>
      <div class="rewards" id="dollsBox"></div>
      <button class="btn btn-gold" id="resetStockBtn" style="width:100%;margin-top:8px">重置无限库存</button>
    </section>
  </section>
</div>
<script src="/admin.js"></script>
</body>
</html>
